<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – BookHaven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="logo"><span>Book</span>Haven</div>
      <p class="text-muted mt-1">Sign in to your account</p>
    </div>

    <div id="login-error" class="alert alert-danger d-none py-2"></div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Your password" required>
          <button type="button" class="btn btn-outline-secondary"
                  onclick="togglePw(this, 'password')"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>

    <hr>
    <div class="text-center small text-muted mb-2">Demo accounts:</div>
    <div class="d-flex flex-column gap-1">
      <button class="btn btn-sm btn-outline-secondary" onclick="fillDemo('admin@bookstore.com','Admin@123')">
        <i class="bi bi-shield"></i> Admin Demo
      </button>
      <button class="btn btn-sm btn-outline-secondary" onclick="fillDemo('sarah@example.com','Author@123')">
        <i class="bi bi-pencil"></i> Author Demo
      </button>
      <button class="btn btn-sm btn-outline-secondary" onclick="fillDemo('john@example.com','Customer@123')">
        <i class="bi bi-person"></i> Customer Demo
      </button>
    </div>

    <p class="text-center mt-3 mb-0">
      Don't have an account? <a href="register.html">Register</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (getToken()) {
    const u = getUser();
    if (u?.role === 'admin') window.location.href = 'admin-dashboard.html';
    else if (u?.role === 'author') window.location.href = 'author-dashboard.html';
    else window.location.href = 'index.html';
  }

  document.addEventListener('DOMContentLoaded', () => {
    setupLoginForm();

    // Show error inline
    const errEl = document.getElementById('login-error');
    const origSetup = setupLoginForm;
    document.getElementById('login-form').addEventListener('submit', () => {
      if (errEl) errEl.classList.add('d-none');
    });
  });

  // Override to show alert box
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.classList.add('d-none');

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });
      setSession(data.token, data.user);
      if (data.user.role === 'admin') window.location.href = 'admin-dashboard.html';
      else if (data.user.role === 'author') window.location.href = 'author-dashboard.html';
      else window.location.href = 'index.html';
    } catch (err) {
      errEl.textContent = err.message || 'Login failed';
      errEl.classList.remove('d-none');
    }
  });

  function fillDemo(email, pw) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pw;
  }

  function togglePw(btn, inputId) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>
</body>
</html>
