<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – BookHaven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span>Book</span>Haven</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="books.html">Browse</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <span class="nav-link" id="user-label-nav"></span>
        </li>
        <li class="nav-item">
          <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <h2 class="section-title"><i class="bi bi-cart3 me-2"></i>Shopping Cart</h2>

  <div class="row g-4">
    <!-- Cart items -->
    <div class="col-lg-8">
      <div id="cart-items">
        <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
      </div>
      <div class="mt-2">
        <button class="btn btn-outline-danger btn-sm" onclick="clearCart()">
          <i class="bi bi-trash"></i> Clear Cart
        </button>
        <a href="books.html" class="btn btn-outline-secondary btn-sm ms-2">
          <i class="bi bi-arrow-left"></i> Continue Shopping
        </a>
      </div>
    </div>

    <!-- Order summary -->
    <div class="col-lg-4">
      <div class="cart-summary d-none" id="cart-summary">
        <h5 class="fw-bold mb-3">Order Summary</h5>
        <div class="d-flex justify-content-between mb-2">
          <span class="text-muted">Subtotal</span>
          <span class="cart-total" id="cart-total">$0.00</span>
        </div>
        <div class="d-flex justify-content-between mb-3">
          <span class="text-muted">Shipping</span>
          <span class="text-success">Free</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between fw-bold mb-3">
          <span>Total</span>
          <span class="cart-total" id="cart-total-2">$0.00</span>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Payment Method</label>
          <select id="payment-method" class="form-select">
            <option value="">Select payment method…</option>
            <option value="Credit Card">Credit Card</option>
            <option value="PayPal">PayPal</option>
            <option value="Cash">Cash</option>
          </select>
        </div>

        <button class="btn btn-danger w-100 py-2 fw-semibold" onclick="placeOrder()">
          <i class="bi bi-bag-check me-1"></i> Place Order
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container text-center">
    <small>BookHaven &copy; 2025</small>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!requireAuth()) return;
    if (!requireRole('customer')) return;

    const user = getUser();
    const label = document.getElementById('user-label-nav');
    if (label) label.textContent = user?.full_name || '';

    loadCart();

    // Sync total display
    const origLoad = loadCart;
    const observer = new MutationObserver(() => {
      const t1 = document.getElementById('cart-total');
      const t2 = document.getElementById('cart-total-2');
      if (t1 && t2) t2.textContent = t1.textContent;
    });
    observer.observe(document.getElementById('cart-items'), { childList: true, subtree: true });
  });
</script>
</body>
</html>
