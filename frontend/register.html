<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – BookHaven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper py-4">
  <div class="auth-card" style="max-width:500px">
    <div class="text-center mb-4">
      <div class="logo"><span>Book</span>Haven</div>
      <p class="text-muted mt-1">Create a new account</p>
    </div>

    <div id="register-error" class="alert alert-danger d-none py-2"></div>

    <form id="register-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
        <input type="text" id="full_name" class="form-control" placeholder="John Smith" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Account Type <span class="text-danger">*</span></label>
        <select id="role" class="form-select" required>
          <option value="customer">Customer – Browse & buy books</option>
          <option value="author">Author – Publish & manage books</option>
        </select>
      </div>

      <!-- Dynamic extra fields based on role -->
      <div id="extra-fields">
        <!-- customer fields shown by default -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Address</label>
          <input type="text" id="address" class="form-control" placeholder="Your address">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone</label>
          <input type="text" id="phone" class="form-control" placeholder="Phone number">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
          <button type="button" class="btn btn-outline-secondary" onclick="togglePw('password')">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
        <input type="password" id="confirm_password" class="form-control" placeholder="Repeat password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-person-plus me-1"></i> Create Account
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      Already have an account? <a href="login.html">Sign In</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script>
  if (getToken()) window.location.href = 'index.html';

  document.addEventListener('DOMContentLoaded', () => {
    const roleSelect  = document.getElementById('role');
    const extraFields = document.getElementById('extra-fields');

    roleSelect.addEventListener('change', () => {
      extraFields.innerHTML = buildExtraFields(roleSelect.value);
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('register-error');
      errEl.classList.add('d-none');

      const pw  = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      if (pw !== cpw) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('d-none');
        return;
      }

      const payload = {
        full_name: document.getElementById('full_name').value.trim(),
        email:     document.getElementById('email').value.trim(),
        password:  pw,
        role:      roleSelect.value,
      };

      if (payload.role === 'customer') {
        payload.address = document.getElementById('address')?.value || '';
        payload.phone   = document.getElementById('phone')?.value   || '';
      } else if (payload.role === 'author') {
        payload.biography = document.getElementById('biography')?.value || '';
      }

      try {
        const data = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify(payload) });
        setSession(data.token, data.user);
        if (data.user.role === 'author') window.location.href = 'author-dashboard.html';
        else window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message || 'Registration failed';
        errEl.classList.remove('d-none');
      }
    });
  });

  function togglePw(inputId) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
