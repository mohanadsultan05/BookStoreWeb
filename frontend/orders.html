<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders – BookHaven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span>Book</span>Haven</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="books.html">Browse</a></li>
        <li class="nav-item"><a class="nav-link" href="cart.html"><i class="bi bi-cart"></i> Cart</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><span class="nav-link" id="user-label-nav"></span></li>
        <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <h2 class="section-title"><i class="bi bi-box-seam me-2"></i>My Orders</h2>
  <div id="orders-list">
    <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
  </div>
</div>

<footer><div class="container text-center"><small>BookHaven &copy; 2025</small></div></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!requireAuth()) return;
    const user = getUser();
    const label = document.getElementById('user-label-nav');
    if (label) label.textContent = user?.full_name || '';
    loadOrders();
  });
</script>
</body>
</html>
