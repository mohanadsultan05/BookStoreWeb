<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Books – BookHaven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span>Book</span>Haven</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="books.html">Browse Books</a></li>
      </ul>
      <ul class="navbar-nav align-items-center">
        <li class="nav-item" id="guest-links">
          <a class="nav-link" href="login.html"><i class="bi bi-person"></i> Login</a>
        </li>
        <li class="nav-item dropdown d-none" id="user-links">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> <span id="user-label"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li data-role="customer"><a class="dropdown-item" href="cart.html">
              <i class="bi bi-cart"></i> Cart
              <span id="cart-count" class="badge bg-danger ms-1" style="display:none">0</span></a></li>
            <li data-role="customer"><a class="dropdown-item" href="orders.html"><i class="bi bi-box"></i> My Orders</a></li>
            <li data-role="admin"><a class="dropdown-item" href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Admin Panel</a></li>
            <li data-role="author"><a class="dropdown-item" href="author-dashboard.html"><i class="bi bi-pencil-square"></i> Author Panel</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row g-4">

    <!-- Sidebar filters -->
    <div class="col-lg-3">
      <div class="card border-0 shadow-sm p-3">
        <h6 class="fw-bold mb-3"><i class="bi bi-funnel me-1"></i>Filters</h6>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Search</label>
          <div class="input-group input-group-sm">
            <input type="text" id="search-input" class="form-control" placeholder="Title, author, genre…">
            <button class="btn btn-danger" id="search-btn"><i class="bi bi-search"></i></button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Genre</label>
          <select id="genre-filter" class="form-select form-select-sm">
            <option value="">All Genres</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Price Range</label>
          <div class="row g-2">
            <div class="col-6">
              <input type="number" id="min-price" class="form-control form-control-sm" placeholder="Min $" min="0">
            </div>
            <div class="col-6">
              <input type="number" id="max-price" class="form-control form-control-sm" placeholder="Max $" min="0">
            </div>
          </div>
        </div>

        <button class="btn btn-outline-secondary btn-sm w-100" id="clear-filters">
          <i class="bi bi-x-circle me-1"></i>Clear Filters
        </button>
      </div>
    </div>

    <!-- Books grid -->
    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted small" id="result-count">Loading…</span>
      </div>

      <div id="books-grid" class="row row-cols-2 row-cols-md-3 row-cols-xl-4 g-3">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary"></div>
        </div>
      </div>

      <div id="pagination" class="mt-4"></div>
    </div>
  </div>
</div>

<!-- Book detail modal (quick view) -->
<footer>
  <div class="container text-center">
    <small>BookHaven &copy; 2025 – Software Architecture Final Project</small>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/books.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    updateNavbar();
    updateCartBadge();
    initBooksPage();
  });
</script>
</body>
</html>
