<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – BookHaven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span>Book</span>Haven</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="books.html">Browse</a></li>
        <li class="nav-item" id="cart-link"><a class="nav-link" href="cart.html">
          <i class="bi bi-cart"></i> Cart
          <span id="cart-count" class="badge bg-danger" style="display:none">0</span>
        </a></li>
        <li class="nav-item" id="orders-link"><a class="nav-link" href="orders.html">My Orders</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-danger" href="#" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5" style="max-width:600px">
  <h2 class="section-title"><i class="bi bi-person-circle me-2"></i>My Profile</h2>

  <div id="profile-alert" class="alert d-none py-2"></div>

  <div class="card border-0 shadow-sm p-4">
    <form id="profile-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" id="full_name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" id="email" class="form-control" disabled>
        <div class="form-text">Email cannot be changed.</div>
      </div>

      <!-- Customer extra fields -->
      <div id="customer-fields" class="d-none">
        <div class="mb-3">
          <label class="form-label fw-semibold">Address</label>
          <input type="text" id="address" class="form-control" placeholder="Your address">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone</label>
          <input type="text" id="phone" class="form-control" placeholder="Phone number">
        </div>
      </div>

      <!-- Author extra fields -->
      <div id="author-fields" class="d-none">
        <div class="mb-3">
          <label class="form-label fw-semibold">Biography</label>
          <textarea id="biography" class="form-control" rows="4"
                    placeholder="Tell readers about yourself…"></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">
        <i class="bi bi-save me-1"></i>Save Changes
      </button>
      <a href="index.html" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>

<footer><div class="container text-center"><small>BookHaven &copy; 2025</small></div></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    const user = getUser();

    // Show role-specific extra fields
    if (user.role === 'customer') {
      document.getElementById('customer-fields').classList.remove('d-none');
      document.getElementById('orders-link').classList.remove('d-none');
    } else if (user.role === 'author') {
      document.getElementById('author-fields').classList.remove('d-none');
      document.getElementById('cart-link').classList.add('d-none');
      document.getElementById('orders-link').classList.add('d-none');
    }

    updateCartBadge();

    // Load current profile data
    try {
      const data = await apiFetch('/auth/profile');
      const u = data.user;
      document.getElementById('full_name').value = u.full_name || '';
      document.getElementById('email').value     = u.email    || '';

      if (u.profile) {
        if (u.role === 'customer') {
          document.getElementById('address').value = u.profile.address || '';
          document.getElementById('phone').value   = u.profile.phone   || '';
        } else if (u.role === 'author') {
          document.getElementById('biography').value = u.profile.biography || '';
        }
      }
    } catch (err) {
      showAlert('Failed to load profile: ' + err.message, 'danger');
    }

    // Save handler
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = { full_name: document.getElementById('full_name').value.trim() };

      if (user.role === 'customer') {
        payload.address = document.getElementById('address').value.trim();
        payload.phone   = document.getElementById('phone').value.trim();
      } else if (user.role === 'author') {
        payload.biography = document.getElementById('biography').value.trim();
      }

      try {
        const data = await apiFetch('/auth/profile', { method: 'PUT', body: JSON.stringify(payload) });
        // Update stored user name
        const stored = getUser();
        if (stored) { stored.full_name = data.user.full_name; localStorage.setItem('user', JSON.stringify(stored)); }
        showAlert('Profile updated successfully!', 'success');
      } catch (err) {
        showAlert(err.message || 'Update failed', 'danger');
      }
    });
  });

  function showAlert(msg, type) {
    const el = document.getElementById('profile-alert');
    el.className = `alert alert-${type} py-2`;
    el.textContent = msg;
    el.classList.remove('d-none');
    setTimeout(() => el.classList.add('d-none'), 4000);
  }
</script>
</body>
</html>
